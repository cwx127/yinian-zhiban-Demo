<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡片 - OLDER UI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  /* Page scaffold — NOT extracted */
  body { margin: 0; padding: 12px; background: var(--color-background); font-family: var(--font-family-base); color: var(--color-on-surface); }
  .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
  .row.card-row { align-items: stretch; }
  .label { font-family: var(--font-family-base); font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--color-on-surface-variant); min-width: 92px; flex-shrink: 0; }
  .divider { border: none; border-top: 1px solid var(--color-border); margin: 8px 0 12px; }

  /* @component-css-start */
  /* Component definitions — extracted to components.css by deterministic script */
  .card { background: var(--color-card); border-radius: var(--radius-xl); padding: var(--space-6); box-shadow: var(--shadow-2); border: 1px solid var(--color-border); width: 100%; flex-shrink: 0; transition: filter .15s; }
  .card:hover { filter: brightness(0.97); }
  .card.elevated { box-shadow: var(--shadow-3); border: none; }
  .card.outlined { background: transparent; box-shadow: none; border: 1.5px solid var(--color-outline); }
  .card-title { font-family: var(--font-heading); font-size: var(--font-size-h4); font-weight: var(--font-weight-h4); line-height: var(--line-height-h4); color: var(--color-on-surface); margin: 0 0 var(--space-2); }
  .card-desc { font-family: var(--font-family-base); font-size: var(--font-size-body); font-weight: var(--font-weight-body); line-height: var(--line-height-body); color: var(--color-on-surface-variant); margin: 0; }
  .card-icon-row { display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-3); }
  .card-icon { width: var(--size-icon-lg); height: var(--size-icon-lg); flex-shrink: 0; }
  .card-body { font-family: var(--font-family-base); font-size: var(--font-size-body); font-weight: var(--font-weight-body); line-height: var(--line-height-body); color: var(--color-on-surface-variant); margin: 0 0 var(--space-4); }
  .card-action { display: inline-flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-4); background: var(--color-primary); color: var(--color-on-primary); border: none; border-radius: var(--radius-md); font-family: var(--font-family-base); font-size: var(--font-size-caption); font-weight: 500; cursor: pointer; white-space: nowrap; min-width: var(--size-button-sm); height: var(--size-button-sm); transition: background .15s; }
  .card-action:hover { background: var(--color-primary-hover); }
  .card-list { list-style: none; padding: 0; margin: var(--space-3) 0 0; }
  .card-list li { font-family: var(--font-family-base); font-size: var(--font-size-body); font-weight: var(--font-weight-body); line-height: var(--line-height-body); color: var(--color-on-surface-variant); padding: var(--space-3) 0; border-bottom: 1px solid var(--color-border); }
  .card-list li:last-child { border-bottom: none; padding-bottom: 0; }
  /* @component-css-end */
</style>
</head>
<body>
<div class="row"><span class="label">Default</span></div>
<div class="row card-row">
  <div class="card" data-evidence-sample="Default Card">
    <h3 class="card-title">健康日报</h3>
    <p class="card-desc">今日步数已达 8,200 步，心率正常。建议下午补充水分，保持适量运动。</p>
  </div>
</div>

<div class="row"><span class="label">Elevated</span></div>
<div class="row card-row">
  <div class="card elevated" data-evidence-sample="Elevated Card">
    <div class="card-icon-row">
      <img class="card-icon" src="https://cdn.jsdelivr.net/npm/lucide-static@1.8.0/icons/bell.svg" alt="提醒">
      <h3 class="card-title" style="margin-bottom:0">智能提醒</h3>
    </div>
    <p class="card-body">距离服药时间还有 30 分钟，请提前准备温水。</p>
    <button class="card-action">查看详情</button>
  </div>
</div>

<hr class="divider">

<div class="row"><span class="label">Outlined</span></div>
<div class="row card-row">
  <div class="card outlined" data-evidence-sample="Outlined Card">
    <h3 class="card-title">家人关怀</h3>
    <ul class="card-list">
      <li>母亲 — 血压数据正常，已按时服药</li>
      <li>父亲 — 今日步数 6,500 步，运动达标</li>
      <li>长辈 — 体温 36.5°C，状态良好</li>
    </ul>
  </div>
</div>
</body>
</html>
