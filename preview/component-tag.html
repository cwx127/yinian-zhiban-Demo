<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>标签 — OLDER UI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  /* Page scaffold — NOT extracted */
  body { margin: 0; padding: var(--space-3); background: var(--color-surface); font-family: var(--font-body); color: var(--color-on-surface); }
  .row { display: flex; gap: var(--space-2); align-items: center; margin-bottom: var(--space-2); flex-wrap: wrap; }
  .label { width: 92px; flex-shrink: 0; font-size: var(--font-size-eyebrow); font-weight: var(--font-weight-eyebrow); color: var(--color-on-surface-variant); text-transform: uppercase; letter-spacing: 0.06em; }
  .divider { border: none; border-top: 1px solid var(--color-border); margin: var(--space-3) 0; }

  /* @component-css-start */
  .tag { display: inline-flex; align-items: center; border-radius: var(--radius-full); padding: var(--space-1) var(--space-3); font-size: var(--font-size-caption); font-weight: 500; white-space: nowrap; cursor: pointer; line-height: 1.4; flex-shrink: 0; min-height: 28px; min-width: 28px; transition: filter .15s; }
  .tag:hover { filter: brightness(1.08); }
  .tag--default { background: var(--color-surface-container-low); color: var(--color-on-surface-variant); }
  .tag--success { background: rgba(59,169,79,0.12); color: var(--color-success); }
  .tag--warning { background: rgba(212,149,106,0.15); color: var(--color-warning); }
  .tag--error { background: var(--error-container); color: var(--color-error); }
  .tag--sm { padding: var(--space-1) var(--space-2); font-size: var(--font-size-eyebrow); min-height: 24px; min-width: 24px; }
  /* @component-css-end */
</style>
</head>
<body>
  <div class="row">
    <span class="label">默认</span>
    <span class="tag tag--default" data-evidence-sample="Default Medium">已读</span>
    <span class="tag tag--default" data-evidence-sample="Default Medium">待处理</span>
  </div>
  <div class="row">
    <span class="label">紧凑</span>
    <span class="tag tag--default tag--sm" data-evidence-sample="Default Medium">已读</span>
    <span class="tag tag--default tag--sm" data-evidence-sample="Default Medium">待处理</span>
  </div>
  <hr class="divider">
  <div class="row">
    <span class="label">状态</span>
    <span class="tag tag--success" data-evidence-sample="Success">健康良好</span>
    <span class="tag tag--warning" data-evidence-sample="Warning Medium">用药提醒</span>
    <span class="tag tag--error">紧急</span>
  </div>
</body>
</html>
