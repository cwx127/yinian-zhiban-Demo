<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>弹窗 - OLDER UI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
/* Page scaffold — NOT extracted */
body { margin: 0; padding: var(--space-5); background: var(--color-background); font-family: var(--font-body); color: var(--color-on-surface); }
.specimen { max-width: 480px; margin: 0 auto; }
.row { display: flex; gap: var(--space-4); align-items: center; margin-bottom: var(--space-3); flex-wrap: wrap; }
.label { font-family: var(--font-body); font-size: var(--font-size-eyebrow); font-weight: var(--font-weight-eyebrow); color: var(--color-on-surface-variant); letter-spacing: 0.06em; text-transform: uppercase; min-width: 92px; flex-shrink: 0; }
.divider { border: none; border-top: 1px solid var(--color-border); margin: var(--space-4) 0; }

/* @component-css-start */
/* Component definitions — extracted to components.css */
.modal-backdrop { background: rgba(45,42,38,0.4); border-radius: var(--radius-xl); padding: var(--space-5); min-height: 280px; display: flex; align-items: center; justify-content: center; position: relative; }
.modal-dialog { background: var(--color-card); border-radius: var(--radius-xl); padding: var(--space-8); max-width: 400px; width: 100%; box-shadow: var(--shadow-5); text-align: center; }
.modal-dialog.wide { max-width: 420px; }
.modal-icon-area { width: 56px; height: 56px; border-radius: var(--radius-full); background: var(--color-primary-container); display: flex; align-items: center; justify-content: center; margin: 0 auto var(--space-4); flex-shrink: 0; }
.modal-icon-area svg { width: 28px; height: 28px; color: var(--color-primary); }
.modal-title { font-family: var(--font-heading); font-size: var(--font-size-h4); font-weight: var(--font-weight-h4); line-height: var(--line-height-h4); color: var(--color-on-surface); margin: 0 0 var(--space-3); }
.modal-message { font-family: var(--font-body); font-size: var(--font-size-body); font-weight: var(--font-weight-body); line-height: var(--line-height-body); color: var(--color-on-surface-variant); margin: 0 0 var(--space-6); overflow-wrap: break-word; }
.modal-actions { display: flex; gap: var(--space-3); justify-content: center; align-items: center; }
.modal-btn { display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2); border: none; cursor: pointer; font-family: var(--font-body); font-size: var(--font-size-body); font-weight: var(--font-weight-body); line-height: 1; border-radius: var(--radius-md); padding: var(--space-3) var(--space-6); white-space: nowrap; min-height: var(--size-button-lg); min-width: 80px; transition: background .15s, border-color .15s; }
.modal-btn.cancel { background: var(--color-surface-container-high); color: var(--color-on-surface); }
.modal-btn.cancel:hover { background: var(--color-surface-container-highest); }
.modal-btn.confirm { background: var(--color-primary); color: var(--color-on-primary); }
.modal-btn.confirm:hover { background: var(--color-primary-hover); }
.modal-btn.dismiss { background: var(--color-surface-container-high); color: var(--color-on-surface); }
.modal-btn.dismiss:hover { background: var(--color-surface-container-highest); }
/* @component-css-end */
</style>
</head>
<body>
<div class="specimen">

<div class="row">
<span class="label">确认弹窗</span>
</div>
<div class="row">
<div class="modal-backdrop" data-evidence-sample="Confirmation Modal">
<div class="modal-dialog">
<div class="modal-title">确认操作</div>
<div class="modal-message">您确定要发送求助信号吗？家人将立即收到通知。</div>
<div class="modal-actions">
<button class="modal-btn cancel">取消</button>
<button class="modal-btn confirm">确认求助</button>
</div>
</div>
</div>
</div>

<hr class="divider">

<div class="row">
<span class="label">信息弹窗</span>
</div>
<div class="row">
<div class="modal-backdrop" data-evidence-sample="Informational Modal">
<div class="modal-dialog wide">
<div class="modal-icon-area">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
</div>
<div class="modal-title">确认操作</div>
<div class="modal-message">您确定要发送求助信号吗？家人将立即收到通知。</div>
<div class="modal-actions">
<button class="modal-btn dismiss">取消</button>
</div>
</div>
</div>
</div>

</div>
</body>
</html>
