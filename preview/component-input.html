<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; padding: var(--space-3); background: var(--color-surface); font-family: var(--font-family-base); color: var(--color-on-surface); }
    .row { display: flex; gap: var(--space-4); align-items: flex-start; margin-bottom: var(--space-2); flex-wrap: wrap; }
    .label { font-size: var(--font-size-eyebrow); font-weight: var(--font-weight-eyebrow); color: var(--color-on-surface-variant); text-transform: uppercase; letter-spacing: 0.06em; min-width: 92px; flex-shrink: 0; padding-top: 18px; }
    .divider { border: none; border-top: 1px solid var(--color-outline); margin: var(--space-4) 0; }
    /* @component-css-start */
    .input-wrapper { display: flex; flex-direction: column; gap: var(--space-1); flex-shrink: 0; min-width: 180px; }
    .input-label { font-size: var(--font-size-caption); font-weight: var(--font-weight-caption); color: var(--color-on-surface); }
    .input-field { height: var(--size-input-height); background: var(--color-surface); border: 1.5px solid var(--color-outline); border-radius: var(--radius-lg); padding: var(--space-4) var(--space-5); font-size: var(--font-size-body); font-family: var(--font-family-base); color: var(--color-on-surface); outline: none; width: 100%; box-sizing: border-box; transition: border-color .15s, box-shadow .15s; }
    .input-field::placeholder { color: var(--color-muted-foreground); }
    .input-field:hover:not(:disabled) { border-color: var(--color-on-surface-variant); }
    .input-field:focus { border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(46,139,123,0.15); }
    .input-field:disabled { background: var(--color-surface-dim); color: var(--color-muted-foreground); cursor: not-allowed; }
    .input-field.error { border-color: var(--color-error); }
    .input-field.error:focus { border-color: var(--color-error); box-shadow: 0 0 0 3px rgba(220,53,53,0.15); }
    .helper-text { font-size: var(--font-size-eyebrow); color: var(--color-on-surface-variant); }
    .error-text { font-size: var(--font-size-eyebrow); color: var(--color-error); }
    /* @component-css-end */
  </style>
</head>
<body>
  <div class="row">
    <span class="label">DEFAULT</span>
    <div class="input-wrapper"><label class="input-label">姓名</label><input class="input-field" type="text" placeholder="请输入姓名"></div>
    <div class="input-wrapper"><label class="input-label">手机号码</label><input class="input-field" type="tel" placeholder="请输入手机号码"><span class="helper-text">选填</span></div>
  </div>
  <div class="row">
    <span class="label">DISABLED</span>
    <div class="input-wrapper"><label class="input-label">备注</label><input class="input-field" type="text" value="已有内容" disabled></div>
  </div>
  <hr class="divider">
  <div class="row">
    <span class="label">ERROR</span>
    <div class="input-wrapper"><label class="input-label">手机号码</label><input class="input-field error" type="tel" value="13800"><span class="error-text">请输入有效的手机号码</span></div>
    <div class="input-wrapper"><label class="input-label">邮箱地址</label><input class="input-field" type="email" placeholder="请输入邮箱地址"></div>
  </div>
</body>
</html>
