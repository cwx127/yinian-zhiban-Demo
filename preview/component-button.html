<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>按钮 — OLDER UI</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    /* Page scaffold — NOT extracted */
    body { margin: 0; padding: var(--space-3); background: var(--color-surface); font-family: var(--font-family-base); color: var(--color-on-surface); }
    .row { display: flex; gap: var(--space-2); align-items: center; margin-bottom: var(--space-2); flex-wrap: wrap; }
    .label { font-size: var(--font-size-eyebrow); font-weight: var(--font-weight-eyebrow); color: var(--color-muted-foreground); text-transform: uppercase; letter-spacing: 0.06em; min-width: 92px; flex-shrink: 0; }
    hr.divider { border: none; border-top: 1px solid var(--color-border); margin: var(--space-3) 0; }

    /* @component-css-start */
    .btn { display: inline-flex; align-items: center; justify-content: center; white-space: nowrap; cursor: pointer; font-family: var(--font-family-base); border: none; outline: none; transition: background .15s, border-color .15s, opacity .15s; flex-shrink: 0; }
    .btn:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 2px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
    .btn-sm { height: var(--size-button-sm); padding: 6px 12px; font-size: var(--font-size-caption); border-radius: var(--radius-md); min-width: var(--size-button-sm); }
    .btn-md { height: var(--size-button-md); padding: 10px 24px; font-size: var(--font-size-body); border-radius: var(--radius-lg); min-width: var(--size-button-md); }
    .btn-lg { height: var(--size-button-lg); padding: 14px 32px; font-size: var(--font-size-body); border-radius: var(--radius-lg); min-width: var(--size-button-lg); }
    .btn-primary { background: var(--color-primary); color: var(--primary-foreground); font-weight: 600; }
    .btn-primary:hover { background: var(--color-primary-hover); }
    .btn-primary:active { filter: brightness(0.95); }
    .btn-secondary { background: var(--color-surface-container); color: var(--color-on-surface); font-weight: 500; }
    .btn-secondary:hover { background: var(--color-surface-container-high); }
    .btn-secondary:active { filter: brightness(0.97); }
    .btn-outline { background: transparent; color: var(--color-primary); border: 1.5px solid var(--color-outline); font-weight: 500; }
    .btn-outline:hover { border-color: var(--color-primary); background: var(--color-primary-container); }
    .btn-outline:active { filter: brightness(0.97); }
    .btn-ghost { background: transparent; color: var(--color-muted-foreground); font-weight: 500; }
    .btn-ghost:hover { background: var(--color-surface-container-low); color: var(--color-on-surface); }
    .btn-ghost:active { filter: brightness(0.97); }
    /* @component-css-end */
  </style>
</head>
<body>
  <div class="row"><span class="label">主要操作</span>
    <button class="btn btn-primary btn-sm">保存草稿</button>
    <button class="btn btn-primary btn-md">立即提交</button>
    <button class="btn btn-primary btn-lg">开始使用</button>
  </div>
  <div class="row"><span class="label">次要操作</span>
    <button class="btn btn-secondary btn-sm">取消</button>
    <button class="btn btn-secondary btn-md">返回上一步</button>
    <button class="btn btn-secondary btn-lg">了解更多</button>
  </div>
  <div class="row"><span class="label">边框按钮</span>
    <button class="btn btn-outline btn-sm">详情</button>
    <button class="btn btn-outline btn-md">查看文档</button>
    <button class="btn btn-outline btn-lg">浏览全部</button>
  </div>
  <div class="row"><span class="label">文字按钮</span>
    <button class="btn btn-ghost btn-sm">清除</button>
    <button class="btn btn-ghost btn-md">跳过此步</button>
    <button class="btn btn-ghost btn-lg">稍后再说</button>
  </div>

  <hr class="divider">

  <div class="row"><span class="label">禁用状态</span>
    <button class="btn btn-primary btn-md" disabled>主要操作</button>
    <button class="btn btn-secondary btn-md" disabled>次要操作</button>
    <button class="btn btn-outline btn-md" disabled>边框按钮</button>
    <button class="btn btn-ghost btn-md" disabled>文字按钮</button>
  </div>
</body>
</html>
